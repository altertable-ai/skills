name: Update marketplace version on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update marketplace.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.metadata.version = $v | .plugins[].version = $v' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Update plugin.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' \
            .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json

      - name: Sync AGENTS.md available skills
        run: python3 scripts/sync-agents-md.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json .claude-plugin/plugin.json AGENTS.md
          git diff --staged --quiet && exit 0
          git commit -m "Release ${{ steps.version.outputs.version }}"
          git push
