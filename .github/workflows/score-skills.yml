name: Score Skills

on:
  pull_request:
    branches: [main]

jobs:
  score:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: changes
        with:
          list-files: shell
          filters: |
            skills:
              - 'skills/*/SKILL.md'
              - 'skills/*/references/**'

      - name: Install uv
        if: steps.changes.outputs.skills == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Score skills
        id: score
        if: steps.changes.outputs.skills == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_FILES: ${{ steps.changes.outputs.skills_files }}
        run: |
          skills=$(echo "$CHANGED_FILES" | tr ' ' '\n' | awk -F/ 'NF>=2 {print $1"/"$2}' | sort -u | grep -v 'SKILL_TEMPLATE' | tr '\n' ' ' | xargs)
          if [ -z "$skills" ]; then
            echo "No skills to score (only SKILL_TEMPLATE changed)"
            echo "skipped=1" >> $GITHUB_OUTPUT
            exit 0
          fi
          comment=$(uv run --quiet python scripts/score-skills.py $skills --pr_comment --min_score=70) || failed=1
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$comment" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "failed=${failed:-0}" >> $GITHUB_OUTPUT

      - name: Comment PR
        if: steps.changes.outputs.skills == 'true' && steps.score.outputs.skipped != '1'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: skill-score
          message: ${{ steps.score.outputs.comment }}

      - name: Check result
        if: steps.score.outputs.failed == '1'
        run: exit 1
