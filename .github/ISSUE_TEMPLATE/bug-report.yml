name: Bug Report
description: Report an issue with an existing skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please provide as much detail as possible.

  - type: input
    id: skill-name
    attributes:
      label: Affected Skill
      description: Which skill has the issue?
      placeholder: "e.g., querying-lakehouse"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: "A clear description of the issue"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Ask the agent...
        2. The skill activates...
        3. The output shows...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did you encounter this issue?
      multiple: true
      options:
        - Claude Code
        - Codex
        - Cursor
        - Altertable
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, logs, etc.)
