repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check scripts/
        language: system
        types: [python]
        pass_filenames: false

      - id: validate-skills
        name: validate skills
        entry: bash -c 'for f in "$@"; do dir=$(dirname "$f"); uv run skills validate "$dir" || exit 1; done' --
        language: system
        files: 'SKILL\.md$'
        exclude: 'SKILL_TEMPLATE/'
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
