[project]
name = "altertable-skills"
version = "0.1.0"
description = "Skills for AI agents"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
    "ruff",
    "ty",
    "pre-commit",
    "pytest",
    "pytest-asyncio",
    "skills-cli",
    "fire",
    "litellm",
    "pydantic",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ASYNC"]

[tool.ty.environment]
python-version = "3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["scripts/tests"]
pythonpath = ["scripts"]
